<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0b10" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="holo" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="8" x2="8" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="400" height="560" rx="12" fill="url(#bg)"/>
  <rect width="400" height="560" rx="12" fill="url(#radial)"/>
  <rect width="400" height="560" rx="12" fill="url(#holo)" opacity="0.05"/>
  <rect x="1.5" y="1.5" width="397" height="557" rx="11" fill="none" stroke="url(#border-grad)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="3" y="3" width="394" height="554" rx="10" fill="none" stroke="#ec4899" stroke-width="0.5" opacity="0.4"/>

  <text x="200" y="38" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="700" letter-spacing="4" fill="#ec4899" opacity="0.8">FRAMESHIFT</text>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#ec4899" stroke-width="0.5" opacity="0.3"/>

  <!-- Browser outline with layers -->
  <g transform="translate(200, 240)" filter="url(#glow-strong)">
    <!-- Back layer -->
    <rect x="-55" y="-75" width="130" height="95" rx="5" fill="#0a0b10" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
    <!-- Mid layer -->
    <rect x="-65" y="-60" width="130" height="95" rx="5" fill="#0a0b10" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <!-- Front browser layer -->
    <rect x="-75" y="-45" width="130" height="95" rx="5" fill="#0a0b10" stroke="#ec4899" stroke-width="2.5"/>
    <!-- URL bar area -->
    <rect x="-65" y="-35" width="110" height="14" rx="3" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
    <!-- Navigation dots -->
    <circle cx="-58" cy="-28" r="4" fill="#ec4899" opacity="0.7"/>
    <circle cx="-46" cy="-28" r="4" fill="#ec4899" opacity="0.5"/>
    <!-- Content area lines -->
    <line x1="-65" y1="-10" x2="45" y2="-10" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>
    <line x1="-65" y1="6" x2="20" y2="6" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
    <line x1="-65" y1="22" x2="35" y2="22" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
    <line x1="-65" y1="38" x2="10" y2="38" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
  </g>

  <rect x="0" y="480" width="400" height="80" rx="0" fill="#ec4899" opacity="0.06"/>
  <rect x="0" y="480" width="400" height="1" fill="#ec4899" opacity="0.4"/>
  <text x="200" y="530" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" letter-spacing="6" fill="#ffffff" filter="url(#glow)">FRONTEND</text>

  <polyline points="20,20 20,40 40,40" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,20 380,40 360,40" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <polyline points="20,540 20,520 40,520" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,540 380,520 360,520" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
</svg>
