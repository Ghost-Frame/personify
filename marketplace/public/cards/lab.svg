<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0b10" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="holo" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="8" x2="8" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="400" height="560" rx="12" fill="url(#bg)"/>
  <rect width="400" height="560" rx="12" fill="url(#radial)"/>
  <rect width="400" height="560" rx="12" fill="url(#holo)" opacity="0.05"/>
  <rect x="1.5" y="1.5" width="397" height="557" rx="11" fill="none" stroke="url(#border-grad)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="3" y="3" width="394" height="554" rx="10" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.4"/>

  <text x="200" y="38" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="700" letter-spacing="4" fill="#8b5cf6" opacity="0.8">FRAMESHIFT</text>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>

  <!-- Flask/beaker -->
  <g transform="translate(200, 240)" filter="url(#glow-strong)">
    <!-- Flask neck -->
    <rect x="-14" y="-80" width="28" height="50" rx="4" fill="#0a0b10" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Flask rim -->
    <rect x="-20" y="-88" width="40" height="12" rx="4" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Flask body (trapezoid) -->
    <path d="M -14,-30 L -55,55 A 10 10 0 0 0 -45,68 L 45,68 A 10 10 0 0 0 55,55 L 14,-30 Z" fill="#0a0b10" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Liquid fill -->
    <path d="M -50,40 L 50,40 L 45,68 A 10 10 0 0 1 -45,68 Z" fill="#8b5cf6" opacity="0.3"/>
    <!-- Bubbles in liquid -->
    <circle cx="-20" cy="55" r="6" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="10" cy="48" r="4" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="30" cy="58" r="5" fill="#8b5cf6" opacity="0.5"/>
  </g>

  <rect x="0" y="480" width="400" height="80" rx="0" fill="#8b5cf6" opacity="0.06"/>
  <rect x="0" y="480" width="400" height="1" fill="#8b5cf6" opacity="0.4"/>
  <text x="200" y="530" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" letter-spacing="6" fill="#ffffff" filter="url(#glow)">LAB</text>

  <polyline points="20,20 20,40 40,40" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,20 380,40 360,40" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <polyline points="20,540 20,520 40,520" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,540 380,520 360,520" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
</svg>
