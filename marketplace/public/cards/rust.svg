<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0b10" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="holo" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="8" x2="8" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#ea580c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <rect width="400" height="560" rx="12" fill="url(#bg)"/>
  <rect width="400" height="560" rx="12" fill="url(#radial)"/>
  <rect width="400" height="560" rx="12" fill="url(#holo)" opacity="0.05"/>
  <rect x="1.5" y="1.5" width="397" height="557" rx="11" fill="none" stroke="url(#border-grad)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="3" y="3" width="394" height="554" rx="10" fill="none" stroke="#ea580c" stroke-width="0.5" opacity="0.4"/>

  <text x="200" y="38" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="700" letter-spacing="4" fill="#ea580c" opacity="0.8">FRAMESHIFT</text>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#ea580c" stroke-width="0.5" opacity="0.3"/>

  <!-- Gear with R inside -->
  <g transform="translate(200, 240)" filter="url(#glow-strong)">
    <!-- Gear outer ring with teeth -->
    <circle cx="0" cy="0" r="65" fill="#0a0b10" stroke="#ea580c" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="48" fill="#0a0b10" stroke="#ea580c" stroke-width="1.5"/>
    <!-- Gear teeth (8) -->
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(0)"/>
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(45)"/>
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(90)"/>
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(135)"/>
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(180)"/>
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(225)"/>
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(270)"/>
    <rect x="-9" y="-77" width="18" height="24" rx="3" fill="#ea580c" opacity="0.9" transform="rotate(315)"/>
    <!-- R letter inside -->
    <text x="0" y="16" text-anchor="middle" font-family="'Courier New', monospace" font-size="46" font-weight="900" fill="#ea580c" opacity="0.95">R</text>
  </g>

  <rect x="0" y="480" width="400" height="80" rx="0" fill="#ea580c" opacity="0.06"/>
  <rect x="0" y="480" width="400" height="1" fill="#ea580c" opacity="0.4"/>
  <text x="200" y="530" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" letter-spacing="6" fill="#ffffff" filter="url(#glow)">RUST</text>

  <polyline points="20,20 20,40 40,40" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,20 380,40 360,40" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.6"/>
  <polyline points="20,540 20,520 40,520" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,540 380,520 360,520" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.6"/>
</svg>
