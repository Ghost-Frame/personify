<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#a8a29e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0b10" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="holo" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="8" x2="8" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="50%" stop-color="#a8a29e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
  </defs>

  <rect width="400" height="560" rx="12" fill="url(#bg)"/>
  <rect width="400" height="560" rx="12" fill="url(#radial)"/>
  <rect width="400" height="560" rx="12" fill="url(#holo)" opacity="0.05"/>
  <rect x="1.5" y="1.5" width="397" height="557" rx="11" fill="none" stroke="url(#border-grad)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="3" y="3" width="394" height="554" rx="10" fill="none" stroke="#a8a29e" stroke-width="0.5" opacity="0.4"/>

  <text x="200" y="38" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="700" letter-spacing="4" fill="#a8a29e" opacity="0.8">FRAMESHIFT</text>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#a8a29e" stroke-width="0.5" opacity="0.3"/>

  <!-- Quill/pen nib -->
  <g transform="translate(200, 240)" filter="url(#glow-strong)">
    <!-- Quill feather body -->
    <path d="M 0,70 C -10,40 -60,-10 -30,-80 C -10,-60 20,-40 0,70 Z" fill="#a8a29e" opacity="0.5"/>
    <path d="M 0,70 C 10,40 60,-10 30,-80 C 10,-60 -20,-40 0,70 Z" fill="#a8a29e" opacity="0.4"/>
    <!-- Feather spine -->
    <line x1="0" y1="-80" x2="0" y2="70" stroke="#a8a29e" stroke-width="2" opacity="0.9"/>
    <!-- Barb lines left -->
    <line x1="0" y1="-60" x2="-25" y2="-50" stroke="#a8a29e" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-40" x2="-32" y2="-25" stroke="#a8a29e" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-20" x2="-35" y2="-5" stroke="#a8a29e" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="0" x2="-32" y2="15" stroke="#a8a29e" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="20" x2="-25" y2="32" stroke="#a8a29e" stroke-width="1" opacity="0.4"/>
    <!-- Barb lines right -->
    <line x1="0" y1="-60" x2="25" y2="-50" stroke="#a8a29e" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-40" x2="32" y2="-25" stroke="#a8a29e" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-20" x2="35" y2="-5" stroke="#a8a29e" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="0" x2="32" y2="15" stroke="#a8a29e" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="20" x2="25" y2="32" stroke="#a8a29e" stroke-width="1" opacity="0.4"/>
    <!-- Nib tip -->
    <path d="M -8,55 L 0,75 L 8,55 L 0,60 Z" fill="#a8a29e" opacity="0.9"/>
    <!-- Ink drop -->
    <ellipse cx="0" cy="82" rx="4" ry="6" fill="#a8a29e" opacity="0.7"/>
  </g>

  <rect x="0" y="480" width="400" height="80" rx="0" fill="#a8a29e" opacity="0.06"/>
  <rect x="0" y="480" width="400" height="1" fill="#a8a29e" opacity="0.4"/>
  <text x="200" y="530" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" letter-spacing="6" fill="#ffffff" filter="url(#glow)">WRITER</text>

  <polyline points="20,20 20,40 40,40" fill="none" stroke="#a8a29e" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,20 380,40 360,40" fill="none" stroke="#a8a29e" stroke-width="1.5" opacity="0.6"/>
  <polyline points="20,540 20,520 40,520" fill="none" stroke="#a8a29e" stroke-width="1.5" opacity="0.6"/>
  <polyline points="380,540 380,520 360,520" fill="none" stroke="#a8a29e" stroke-width="1.5" opacity="0.6"/>
</svg>
